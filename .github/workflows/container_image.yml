on:
  push:
    branches:
      - main

jobs:
  container_image:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPOSITORY: ghcr.io/coord-e/grafana-lambda
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: get-base-tag
        shell: bash
        run: |
          from_line=$(grep 'FROM docker.io/grafana/grafana' < Dockerfile)
          echo "::set-output name=base-tag::${from_line##*:}"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:latest,${{ env.IMAGE_REPOSITORY }}:${{ steps.get-base-tag.outputs.base-tag }}
          provenance: false
